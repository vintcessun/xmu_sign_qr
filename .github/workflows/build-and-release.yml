name: Build and Release

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    workflow_dispatch:

jobs:
    build-android:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    # 如果需要分别为 arm64 和 x86_64 生成 APK，可以取消注释
                    # 但通常 assembleRelease 会根据配置生成全架构或 Split APKs
                    - arch: "universal"
        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build Android Release APK
              run: ./gradlew :composeApp:assembleRelease
              env:
                  # 使用项目内的 release.keystore
                  # 注意：密码仍然应该放在 Secrets 中以防泄漏
                  # 这里我们假设 Secrets 中配置了对应的密码，如果没有则回退到 build.gradle.kts 的默认值
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'password' }}
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'releaseKey' }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'password' }}

            - name: Upload APKs
              uses: actions/upload-artifact@v4
              with:
                  name: android-release-apks
                  path: composeApp/build/outputs/apk/release/*.apk

    build-ios:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            # Kotlin 编译器通常通过 Gradle 自动处理，
            # 这里的 setup-java 已经提供了环境。
            # 如果需要特定的 Kotlin 版本，可以通过 gradlew 传递。

            - name: Install the Apple certificate and provisioning profile
              env:
                  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
                  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
                  BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  # create variables
                  CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
                  PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

                  # import certificate and provisioning profile from secrets
                  echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
                  echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

                  # create temporary keychain
                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  # import certificate to keychain
                  security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH

                  # apply provisioning profile
                  mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                  cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

            - name: Build iOS IPA
              run: |
                  # 构建 Kotlin Multiplatform 框架
                  ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode

                  # 使用 xcodebuild 进行构建
                  xcodebuild -workspace iosApp/iosApp.xcworkspace \
                    -scheme iosApp \
                    -sdk iphoneos \
                    -configuration Release \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    archive \
                    -allowProvisioningUpdates

                  # 导出 IPA
                  # 注意：需要一个 ExportOptions.plist 文件
                  # 这里简单处理，实际生产环境需要提供此文件
                  xcodebuild -exportArchive \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    -exportOptionsPlist iosApp/ExportOptions.plist \
                    -exportPath $RUNNER_TEMP/build/ipa \
                    -allowProvisioningUpdates

            - name: Upload IPA
              uses: actions/upload-artifact@v4
              with:
                  name: ios-release-ipa
                  path: ${{ runner.temp }}/build/ipa/*.ipa
