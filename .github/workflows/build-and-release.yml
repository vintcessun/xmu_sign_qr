name: Build and Release

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    workflow_dispatch:

jobs:
    build-android:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    # 如果需要分别为 arm64 和 x86_64 生成 APK，可以取消注释
                    # 但通常 assembleRelease 会根据配置生成全架构或 Split APKs
                    - arch: "universal"
        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build Android Release APK
              run: ./gradlew :composeApp:assembleRelease
              env:
                  # 使用项目内的 release.keystore
                  # 注意：密码仍然应该放在 Secrets 中以防泄漏
                  # 这里我们假设 Secrets 中配置了对应的密码，如果没有则回退到 build.gradle.kts 的默认值
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'password' }}
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'releaseKey' }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'password' }}

            - name: Upload APKs
              uses: actions/upload-artifact@v4
              with:
                  name: android-release-apks
                  path: composeApp/build/outputs/apk/release/*.apk

    build-ios:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build iOS Framework and Artifacts
              run: |
                  # 使用 Gradle 构建 iOS framework 和相关产物
                  # 显式传递 Xcode 环境变量以绕过推断错误
                  ./gradlew :composeApp:assembleReleaseAppleFrameworkForXcode \
                    -Pkotlin.native.cocoapods.platform=iphoneos \
                    -Pkotlin.native.cocoapods.archs=arm64 \
                    -Pkotlin.native.cocoapods.configuration=Release

            # 注意：Gradle 任务 :composeApp:assembleReleaseAppleFrameworkForXcode
            # 主要生成 .framework 文件。如果要生成最终的 IPA，通常仍需 xcodebuild
            # 或通过特定插件。这里我们先确保 Gradle 构建成功，并尝试进行无签名的 archive。

            - name: Archive with xcodebuild (Skip Signing)
              run: |
                  # 使用 xcodebuild 进行 archive，但跳过签名以解决 Team ID 问题
                  xcodebuild -project iosApp/iosApp.xcodeproj \
                    -scheme iosApp \
                    -sdk iphoneos \
                    -configuration Release \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO \
                    archive

            - name: Export IPA (Unsigned)
              run: |
                  # 导出 IPA
                  mkdir -p $RUNNER_TEMP/build/ipa
                  xcodebuild -exportArchive \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    -exportOptionsPlist iosApp/ExportOptions.plist \
                    -exportPath $RUNNER_TEMP/build/ipa \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO

            - name: Upload IPA
              uses: actions/upload-artifact@v4
              with:
                  name: ios-release-ipa
                  path: ${{ runner.temp }}/build/ipa/*.ipa
