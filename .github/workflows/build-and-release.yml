name: Build and Release

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    workflow_dispatch:

jobs:
    build-android:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    # 如果需要分别为 arm64 和 x86_64 生成 APK，可以取消注释
                    # 但通常 assembleRelease 会根据配置生成全架构或 Split APKs
                    - arch: "universal"
        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build Android Release APK
              run: ./gradlew :composeApp:assembleRelease
              env:
                  # 使用项目内的 release.keystore
                  # 注意：密码仍然应该放在 Secrets 中以防泄漏
                  # 这里我们假设 Secrets 中配置了对应的密码，如果没有则回退到 build.gradle.kts 的默认值
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'password' }}
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'releaseKey' }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'password' }}

            - name: Upload APKs
              uses: actions/upload-artifact@v4
              with:
                  name: android-release-apks
                  path: composeApp/build/outputs/apk/release/*.apk

    build-ios:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build iOS IPA
              run: |
                  # 在 KMP 项目中，直接调用 gradlew embed 任务通常需要 Xcode 环境变量（如 ARCHS）。
                  # 推荐的做法是直接运行 xcodebuild，它会自动触发所需的 Gradle 任务。

                  # 使用 xcodebuild 进行构建
                  # 我们显式指定 ARCHS 和 SDK 以解决架构推断问题
                  # 修正路径：由于没有 .xcworkspace，我们直接使用 .xcodeproj
                  xcodebuild -project iosApp/iosApp.xcodeproj \
                    -scheme iosApp \
                    -sdk iphoneos \
                    -configuration Release \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    ARCHS="arm64" \
                    VALID_ARCHS="arm64" \
                    archive \
                    -allowProvisioningUpdates

                  # 导出 IPA
                  xcodebuild -exportArchive \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    -exportOptionsPlist iosApp/ExportOptions.plist \
                    -exportPath $RUNNER_TEMP/build/ipa \
                    -allowProvisioningUpdates

            - name: Upload IPA
              uses: actions/upload-artifact@v4
              with:
                  name: ios-release-ipa
                  path: ${{ runner.temp }}/build/ipa/*.ipa
