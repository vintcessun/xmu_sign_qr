name: Build and Release

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    workflow_dispatch:
        inputs:
            release_tag:
                description: "Release tag，例如 v1.0.0；留空则只编译不发布"
                required: false
                type: string
                default: ""

permissions:
    contents: write

jobs:
    build-android:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                include:
                    - arch: "universal"

        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build Android Release APK
              run: ./gradlew :composeApp:assembleRelease
              env:
                  SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD || 'password' }}
                  SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS || 'releaseKey' }}
                  SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD || 'password' }}

            - name: Upload APKs
              uses: actions/upload-artifact@v4
              with:
                  name: android-release-apks
                  path: composeApp/build/outputs/apk/release/*.apk

    build-ios:
        runs-on: macos-latest

        steps:
            - uses: actions/checkout@v4

            - name: set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: gradle

            - name: Set Kotlin Native Memory
              run: |
                  mkdir -p ~/.gradle
                  echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g" >> ~/.gradle/gradle.properties
                  echo "kotlin.daemon.jvmargs=-Xmx6g" >> ~/.gradle/gradle.properties
                  echo "kotlin.native.link.maxHeapSize=6g" >> ~/.gradle/gradle.properties

            - name: Grant execute permission for gradlew
              run: chmod +x gradlew

            - name: Build iOS Framework and Archive
              run: |
                  xcodebuild -project iosApp/iosApp.xcodeproj \
                    -scheme iosApp \
                    -sdk iphoneos \
                    -configuration Release \
                    -archivePath $RUNNER_TEMP/iosApp.xcarchive \
                    ARCHS="arm64" \
                    SDKROOT="iphoneos" \
                    CONFIGURATION="Release" \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGNING_ALLOWED=NO \
                    archive

            - name: Package App as IPA Unsigned
              run: |
                  mkdir -p $RUNNER_TEMP/build/ipa/Payload
                  cp -r $RUNNER_TEMP/iosApp.xcarchive/Products/Applications/*.app $RUNNER_TEMP/build/ipa/Payload/
                  cd $RUNNER_TEMP/build/ipa
                  zip -r QRCode.ipa Payload
                  rm -rf Payload

            - name: Upload IPA
              uses: actions/upload-artifact@v4
              with:
                  name: ios-release-ipa
                  path: ${{ runner.temp }}/build/ipa/QRCode.ipa

    release:
        name: Publish GitHub Release
        runs-on: ubuntu-latest
        needs:
            - build-android
            - build-ios

        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}

        steps:
            - uses: actions/checkout@v4

            - name: Download Android APK artifact
              uses: actions/download-artifact@v4
              with:
                  name: android-release-apks
                  path: ${{ runner.temp }}/release-assets/android

            - name: Download iOS IPA artifact
              uses: actions/download-artifact@v4
              with:
                  name: ios-release-ipa
                  path: ${{ runner.temp }}/release-assets/ios

            - name: Show release assets
              run: find "${{ runner.temp }}/release-assets" -type f -maxdepth 4 -print

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.release_tag }}
                  name: ${{ inputs.release_tag }}
                  target_commitish: ${{ github.sha }}
                  generate_release_notes: true
                  files: |
                      ${{ runner.temp }}/release-assets/android/*.apk
                      ${{ runner.temp }}/release-assets/ios/*.ipa
